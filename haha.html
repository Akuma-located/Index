<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HAHA 🫵</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
  font-family: monospace;
  color: white;
}

/* stars */
#stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.3;
  border-radius: 50%;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.1; }
  to { opacity: 1; }
}

/* title */
#title {
  position: absolute;
  top: 12%;
  width: 100%;
  text-align: center;
  font-size: 28px;
  text-shadow: 0 0 12px #7f73d2;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* output */
#output {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -45%);
  text-align: center;
  font-size: 12px;
  line-height: 1.6;
  white-space: pre-line;
  opacity: 0.9;
  max-width: 80%;
}

/* map */
#map {
  position: fixed;
  bottom: 10px;
  right: 10px;
  width: 240px;
  height: 150px;
  border: 1px solid rgba(255,255,255,0.2);
  z-index: 5;
}

/* taskbar */
#taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 28px;
  background: rgba(255,255,255,0.05);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  padding: 0 10px;
}
</style>
</head>

<body>

<div id="stars"></div>

<div id="title">HAHA 🫵</div>

<div id="output"></div>

<div id="map"></div>

<div id="taskbar">
  <div id="clock"></div>
  <div>online</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* stars */
for (let i = 0; i < 140; i++) {
  const s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random() * 100 + "vw";
  s.style.top = Math.random() * 100 + "vh";
  s.style.animationDuration = (Math.random() * 3 + 1) + "s";
  document.getElementById("stars").appendChild(s);
}

let lines = [];
const output = document.getElementById("output");

/* START */
start();

function start() {

  const nav = navigator;
  const scr = screen;

  lines = [
    "initializing system...",
    "------------------------",
    "Browser: " + nav.userAgent,
    "Platform: " + nav.platform,
    "Language: " + nav.language,
    "Screen: " + scr.width + " x " + scr.height,
    "CPU Cores: " + (nav.hardwareConcurrency || "unknown"),
    "Timezone: " + Intl.DateTimeFormat().resolvedOptions().timeZone,
    "IP: resolving...",
    "Location: resolving...",
    "------------------------",
    "system online"
  ];

  render();

  getIP();
}

/* IP */
function getIP() {
  fetch("https://api.ipify.org?format=json")
    .then(r => r.json())
    .then(d => {

      const ip = d.ip;

      const i = lines.indexOf("IP: resolving...");
      lines[i] = "IP: " + ip;

      render();

      getGeo(ip);
    })
    .catch(() => {

      const i = lines.indexOf("IP: resolving...");
      lines[i] = "IP: unavailable";

      render();
    });
}

/* render */
function render() {
  output.innerText = lines.join("\n");
}

/* clock */
setInterval(() => {
  const d = new Date();
  document.getElementById("clock").innerText =
    d.getHours().toString().padStart(2,'0') + ":" +
    d.getMinutes().toString().padStart(2,'0');
}, 1000);

</script>

</body>
</html>
